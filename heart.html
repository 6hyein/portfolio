<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어버이날 사랑의 마음 전하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gaegu', cursive;
            overflow: hidden;
            background: linear-gradient(180deg, #fff5f5 0%, #fed7e2 100%);
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        .carnation {
            position: absolute;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        #game-canvas {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .feedback-text {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 1.8rem;
            z-index: 60;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            white-space: nowrap;
        }

        .message-card {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2.5rem 1.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            width: 90%;
            max-width: 550px;
            z-index: 100;
            border: 10px solid #fbb6ce;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .basket-container {
            position: relative;
            width: 180px;
            height: 140px;
            margin: 0 auto 20px;
            animation: basketBounce 2s infinite ease-in-out;
        }

        @keyframes basketBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .basket-heart {
            position: absolute;
            color: #f687b3;
            animation: heartFloat 3s infinite alternate;
        }

        @keyframes heartFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .falling-item {
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .score-badge {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border: 3px solid #f687b3;
        }

        #warning-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 245, 245, 0.9);
            border: 4px solid #f687b3;
            color: #d53f8c;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 80;
            pointer-events: none;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        .btn-gradient {
            background: linear-gradient(to right, #f687b3, #f6e05e);
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-pink-50 p-6 text-center">
        <h1 class="text-5xl md:text-6xl font-bold text-pink-600 mb-6 drop-shadow-sm">어버이날 기념<br>사랑 모으기</h1>
        <div class="mb-8 text-pink-400">
            <i class="fas fa-heart text-7xl animate-bounce"></i>
        </div>
        <p class="text-2xl text-gray-700 mb-8 leading-relaxed">
            화면에서 떨어지는 아이콘 중<br> 
            <b class="text-pink-600">분홍색 하트</b>를 터치해서<br>
            부모님을 향한 마음 10개를 모아주세요!
        </p>
        <button onclick="startGame()" class="btn-gradient text-white px-12 py-4 rounded-full text-3xl font-bold shadow-lg">
            시작하기
        </button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="fixed top-6 left-1/2 -translate-x-1/2 z-40">
            <div class="score-badge px-8 py-3 rounded-full shadow-lg">
                <span class="text-2xl text-pink-600 font-bold">찾은 하트: <span id="score">0</span> / 10</span>
            </div>
        </div>
        <div id="warning-message">💗 하트를 눌러주세요! 💗</div>
        <div id="game-canvas"></div>
    </div>

    <div id="message-card" class="message-card">
        <div class="basket-container">
            <svg viewBox="0 0 200 150" width="180" height="130" style="filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));">
                <path d="M40 60 L160 60 L145 130 Q140 145 100 145 Q60 145 55 130 Z" fill="#d97706" />
                <path d="M40 60 Q100 10 160 60" fill="none" stroke="#b45309" stroke-width="8" />
                <rect x="35" y="55" width="130" height="10" rx="5" fill="#b45309" />
            </svg>
            <i class="fas fa-heart basket-heart" style="top: 45px; left: 60px; font-size: 24px;"></i>
            <i class="fas fa-heart basket-heart" style="top: 35px; left: 85px; font-size: 28px; animation-delay: 0.2s;"></i>
            <i class="fas fa-heart basket-heart" style="top: 48px; left: 110px; font-size: 22px; animation-delay: 0.4s;"></i>
            <i class="fas fa-heart basket-heart" style="top: 55px; left: 45px; font-size: 20px; animation-delay: 0.1s;"></i>
            <i class="fas fa-heart basket-heart" style="top: 60px; left: 75px; font-size: 26px; animation-delay: 0.5s;"></i>
            
            <i class="fas fa-certificate text-red-500 absolute" style="top: 80px; left: -10px; font-size: 35px; transform: rotate(15deg);"></i>
            <i class="fas fa-certificate text-red-500 absolute" style="top: 90px; right: -15px; font-size: 40px; transform: rotate(-10deg);"></i>
        </div>

        <h2 class="text-4xl font-bold text-gray-800 mb-4">사랑을 가득 담았습니다</h2>
        <div class="space-y-4 text-3xl text-gray-700 leading-snug" style="font-family: 'Nanum Pen Script', cursive;">
            <p>언제나 든든한 버팀목이 되어주시는 부모님,</p>
            <p>모은 하트의 개수보다 훨씬 더 많이</p>
            <p>두 분을 사랑하고 존경합니다.</p>
            <p class="text-pink-600 font-bold mt-4">낳아주시고 길러주셔서 감사합니다!</p>
        </div>
        <button onclick="location.reload()" class="mt-8 text-gray-400 text-xl border-b border-gray-300">다시 하기</button>
    </div>

    <script>
        let score = 0;
        const targetScore = 10;
        let gameInterval;
        const gameCanvas = document.getElementById('game-canvas');
        const scoreDisplay = document.getElementById('score');

        const items = [
            { type: 'heart', icon: 'fa-heart', color: 'text-pink-500', feedback: ["사랑해요! ❤️", "기쁨! ❤️", "행복! ❤️", "정성! ❤️"] },
            { type: 'smile', icon: 'fa-face-smile', color: 'text-yellow-400', feedback: ["웃음 가득! 😊", "방긋! 😊"] },
            { type: 'flower', icon: 'fa-certificate', color: 'text-red-500', feedback: ["예쁜 꽃! 🌸", "카네이션! 🌸"] }
        ];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            gameInterval = setInterval(createFallingItem, 800);
        }

        function createFallingItem() {
            if (score >= targetScore) return;

            const itemData = items[Math.floor(Math.random() * items.length)];
            const element = document.createElement('div');
            element.className = `carnation falling-item ${itemData.color} text-4xl md:text-6xl`;
            element.innerHTML = `<i class="fas ${itemData.icon}"></i>`;
            
            const startX = Math.random() * (window.innerWidth - 80);
            element.style.left = `${startX}px`;
            element.style.top = `-80px`;
            
            const duration = 4 + Math.random() * 2;
            element.style.animationDuration = `${duration}s`;

            const handleAction = (e) => {
                e.preventDefault();
                collectItem(element, itemData);
            };
            
            element.addEventListener('mousedown', handleAction);
            element.addEventListener('touchstart', handleAction);

            gameCanvas.appendChild(element);

            setTimeout(() => { if (element.parentNode) element.remove(); }, duration * 1000);
        }

        function collectItem(element, itemData) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top;

            // 배경 피드백 텍스트 생성
            const feedbackMsg = itemData.feedback[Math.floor(Math.random() * itemData.feedback.length)];
            createFeedbackText(centerX, centerY, feedbackMsg, itemData.type === 'heart');

            if (itemData.type === 'heart') {
                createParticles(centerX, rect.top + rect.height/2, 'text-pink-500');
                score++;
                scoreDisplay.innerText = score;
                
                if (score >= targetScore) {
                    clearInterval(gameInterval);
                    setTimeout(showEnding, 800);
                }
            } else {
                showWarning();
                // 하트가 아닌 경우 작아지며 사라지는 연출
                element.style.transition = 'all 0.4s';
                element.style.transform = 'scale(0) rotate(180deg)';
                element.style.opacity = '0';
            }
            element.remove();
        }

        function showWarning() {
            const warning = document.getElementById('warning-message');
            warning.style.display = 'block';
            
            // 이전 애니메이션 중단 및 새로 시작
            warning.animate([
                { transform: 'translate(-50%, -40%) scale(0.8)', opacity: 0 },
                { transform: 'translate(-50%, -50%) scale(1.1)', opacity: 1, offset: 0.1 },
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, offset: 0.8 },
                { transform: 'translate(-50%, -60%) scale(0.9)', opacity: 0 }
            ], {
                duration: 1500,
                easing: 'ease-out'
            }).onfinish = () => {
                warning.style.display = 'none';
            };
        }

        function createFeedbackText(x, y, text, isHeart) {
            const fb = document.createElement('div');
            fb.className = `feedback-text ${isHeart ? 'text-pink-600' : 'text-orange-400'}`;
            fb.innerText = text;
            fb.style.left = `${x}px`;
            fb.style.top = `${y}px`;
            fb.style.transform = 'translateX(-50%)';
            document.body.appendChild(fb);

            // 위로 떠오르며 사라지는 애니메이션
            fb.animate([
                { transform: 'translate(-50%, 0)', opacity: 1 },
                { transform: 'translate(-50%, -120px)', opacity: 0 }
            ], {
                duration: 1200,
                easing: 'ease-out'
            }).onfinish = () => fb.remove();
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = `fixed pointer-events-none ${color} text-xl z-50`;
                p.innerHTML = '<i class="fas fa-heart"></i>';
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                
                const angle = (Math.PI * 2 / 10) * i;
                const velocity = 80 + Math.random() * 40;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                document.body.appendChild(p);
                p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function showEnding() {
            document.getElementById('message-card').style.display = 'block';
            setInterval(() => {
                if (document.getElementById('message-card').style.display === 'block') {
                    const h = document.createElement('div');
                    h.className = 'fixed text-pink-200 text-2xl z-0 pointer-events-none opacity-50';
                    h.innerHTML = '<i class="fas fa-heart"></i>';
                    h.style.left = Math.random() * 100 + 'vw';
                    h.style.top = '-20px';
                    document.body.appendChild(h);
                    h.animate([{ top: '-20px', opacity: 0.5 }, { top: '110vh', opacity: 0 }], { duration: 5000 }).onfinish = () => h.remove();
                }
            }, 500);
        }
    </script>
</body>
</html>
